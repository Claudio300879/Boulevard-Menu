<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulevard Casino - Menú</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 20px; }
        h1 { border-bottom: 2px solid #d4af37; padding-bottom: 10px; color: #d4af37; text-align: center; font-size: 1.8em; }
        h2 { color: #d4af37; margin-top: 30px; border-bottom: 1px solid #333; font-size: 1.2em; text-transform: uppercase; }
        .contenedor { max-width: 500px; margin: auto; }
        .item { background: #222; margin-bottom: 8px; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #d4af37; }
        .precio { font-weight: bold; font-size: 1.1em; color: #d4af37; white-space: nowrap; margin-left: 10px; }
        footer { text-align: center; margin-top: 40px; font-size: 0.8em; color: #888; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>BOULEVARD CASINO</h1>
        <div id="menu-lista">Cargando menú...</div>
    </div>
  ''<footer>POWERED BY GATO SOFTWARE</footer>..>

    <script>
        fetch('productos.json')
            .then(res => res.json())
            .then(data => {
                const contenedor = document.getElementById('menu-lista');
                const categorias = [...new Set(data.map(p => p.cat))];
                let htmlFinal = '';

                categorias.forEach(cat => {
                    htmlFinal += `<h2>${cat}</h2>`;
                    const filtrados = data.filter(p => p.cat === cat);
                    filtrados.forEach(prod => {
                        htmlFinal += `
                            <div class="item">
                                <span>${prod.nombre}</span>
                                <span class="precio">$${prod.precio.toLocaleString('es-AR')}</span>
                            </div>`;
                    });
                });
                contenedor.innerHTML = htmlFinal;
            })
            .catch(err => {
                document.getElementById('menu-lista').innerHTML = "Error al cargar la lista de precios.";
                console.error(err);
            });
    </script>
</body>
</html>
